<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0c14"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c8d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00c8d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4622a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4622a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg1)"/>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="280" rx="250" ry="180" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="300" cy="350" rx="120" ry="80" fill="url(#glowOrange)" filter="url(#blur1)"/>

  <!-- Grid floor lines -->
  <g stroke="#00c8d4" stroke-opacity="0.12" stroke-width="0.8">
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="460" x2="800" y2="460"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <!-- perspective lines -->
    <line x1="400" y1="300" x2="0" y2="520"/>
    <line x1="400" y1="300" x2="160" y2="520"/>
    <line x1="400" y1="300" x2="320" y2="520"/>
    <line x1="400" y1="300" x2="480" y2="520"/>
    <line x1="400" y1="300" x2="640" y2="520"/>
    <line x1="400" y1="300" x2="800" y2="520"/>
  </g>

  <!-- Character silhouette - body -->
  <g fill="#1e2535">
    <!-- legs -->
    <polygon points="345,420 365,420 355,480 340,480" fill="#161b28"/>
    <polygon points="415,420 435,420 445,480 430,480" fill="#161b28"/>
    <!-- torso -->
    <rect x="330" y="270" width="110" height="155" rx="8" fill="#1e2535"/>
    <!-- shoulders extended -->
    <rect x="300" y="278" width="50" height="22" rx="6" fill="#252d40"/>
    <rect x="420" y="278" width="50" height="22" rx="6" fill="#252d40"/>
    <!-- head -->
    <rect x="355" y="215" width="68" height="62" rx="10" fill="#1e2535"/>
    <!-- visor -->
    <rect x="360" y="232" width="58" height="16" rx="4" fill="#0a1828"/>
  </g>

  <!-- Cyber armor details - cyan -->
  <g fill="none" stroke="#00c8d4" stroke-width="1.2">
    <rect x="332" y="272" width="106" height="150" rx="7" stroke-opacity="0.5"/>
    <line x1="385" y1="272" x2="385" y2="422" stroke-opacity="0.3"/>
    <rect x="340" y="290" width="36" height="20" rx="3" stroke-opacity="0.6" fill="#00c8d4" fill-opacity="0.08"/>
    <rect x="394" y="290" width="36" height="20" rx="3" stroke-opacity="0.6" fill="#00c8d4" fill-opacity="0.08"/>
    <!-- chest piece -->
    <polygon points="360,320 420,320 430,360 350,360" stroke-opacity="0.7" fill="#00c8d4" fill-opacity="0.05"/>
    <!-- head visor glow -->
    <rect x="359" y="231" width="60" height="18" rx="4" stroke="#00c8d4" stroke-opacity="0.9" fill="#00c8d4" fill-opacity="0.2"/>
  </g>

  <!-- Orange energy sword right arm -->
  <g>
    <!-- arm -->
    <rect x="462" y="295" width="18" height="70" rx="6" fill="#252d40"/>
    <!-- sword handle -->
    <rect x="468" y="355" width="10" height="28" rx="3" fill="#3a2010"/>
    <!-- sword guard -->
    <rect x="458" y="352" width="30" height="6" rx="2" fill="#8b4520"/>
    <!-- blade -->
    <polygon points="473,355 468,180 478,180" fill="#d4622a" opacity="0.9"/>
    <!-- blade glow -->
    <polygon points="473,355 464,200 482,200" fill="#d4622a" opacity="0.2" filter="url(#blur2)"/>
    <polygon points="473,355 460,210 486,210" fill="#ff8040" opacity="0.1" filter="url(#blur2)"/>
    <!-- blade edge lines -->
    <line x1="468" y1="180" x2="473" y2="355" stroke="#ff9050" stroke-width="0.8" stroke-opacity="0.8"/>
    <line x1="478" y1="180" x2="473" y2="355" stroke="#ff9050" stroke-width="0.8" stroke-opacity="0.8"/>
  </g>

  <!-- Left arm shield -->
  <g>
    <rect x="292" y="295" width="18" height="70" rx="6" fill="#252d40"/>
    <!-- shield -->
    <polygon points="270,310 302,290 302,370 270,380" fill="#1a2535" stroke="#00c8d4" stroke-width="1" stroke-opacity="0.6"/>
    <polygon points="278,318 298,304 298,360 278,368" fill="#00c8d4" fill-opacity="0.08" stroke="#00c8d4" stroke-width="0.5" stroke-opacity="0.4"/>
  </g>

  <!-- Floating energy particles -->
  <g fill="#00c8d4">
    <circle cx="220" cy="180" r="3" opacity="0.8"/>
    <circle cx="180" cy="240" r="2" opacity="0.6"/>
    <circle cx="240" cy="300" r="1.5" opacity="0.5"/>
    <circle cx="580" cy="160" r="2.5" opacity="0.7"/>
    <circle cx="620" cy="220" r="2" opacity="0.5"/>
    <circle cx="560" cy="280" r="1.5" opacity="0.4"/>
    <circle cx="150" cy="350" r="1" opacity="0.6"/>
    <circle cx="650" cy="350" r="1" opacity="0.6"/>
  </g>
  <g fill="#d4622a">
    <circle cx="460" cy="140" r="3" opacity="0.9"/>
    <circle cx="500" cy="170" r="2" opacity="0.7"/>
    <circle cx="490" cy="200" r="1.5" opacity="0.5"/>
    <circle cx="440" cy="120" r="2" opacity="0.6"/>
  </g>

  <!-- Background city silhouette -->
  <g fill="#12172200" stroke="#00c8d420" stroke-width="0.5">
    <rect x="50" y="200" width="30" height="180" fill="#121722" stroke="#00c8d4" stroke-opacity="0.15"/>
    <rect x="90" y="150" width="25" height="230" fill="#121722" stroke="#00c8d4" stroke-opacity="0.15"/>
    <rect x="125" y="220" width="20" height="160" fill="#121722" stroke="#00c8d4" stroke-opacity="0.12"/>
    <rect x="620" y="190" width="28" height="190" fill="#121722" stroke="#00c8d4" stroke-opacity="0.15"/>
    <rect x="658" y="160" width="22" height="220" fill="#121722" stroke="#00c8d4" stroke-opacity="0.15"/>
    <rect x="690" y="230" width="30" height="150" fill="#121722" stroke="#00c8d4" stroke-opacity="0.12"/>
  </g>

  <!-- Title text area -->
  <text x="400" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#00c8d4" fill-opacity="0.5" letter-spacing="6">C Y B E R  &amp;  B L A D E</text>
  <text x="400" y="496" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#888" letter-spacing="3">Z M Q _ Q  ·  2 0 2 5</text>
</svg>