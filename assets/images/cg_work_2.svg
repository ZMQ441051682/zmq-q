<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#150a1a"/>
      <stop offset="100%" stop-color="#080508"/>
    </radialGradient>
    <radialGradient id="magicGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b3ab8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b3ab8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4622a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4622a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="medBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="800" height="520" fill="url(#bg2)"/>

  <!-- Magic circle glow on ground -->
  <ellipse cx="400" cy="420" rx="200" ry="40" fill="#8b3ab8" fill-opacity="0.15" filter="url(#softBlur)"/>
  <ellipse cx="400" cy="300" rx="180" ry="160" fill="url(#magicGlow)" filter="url(#softBlur)"/>
  <ellipse cx="400" cy="340" rx="80" ry="60" fill="url(#orangeGlow2)" filter="url(#softBlur)"/>

  <!-- Magic circle on ground -->
  <g stroke="#8b3ab8" stroke-opacity="0.5" fill="none">
    <circle cx="400" cy="420" r="160" stroke-width="0.8"/>
    <circle cx="400" cy="420" r="130" stroke-width="0.5"/>
    <circle cx="400" cy="420" r="90" stroke-width="1"/>
    <circle cx="400" cy="420" r="55" stroke-width="0.5"/>
    <!-- Rune lines -->
    <line x1="400" y1="260" x2="400" y2="580" stroke-opacity="0.3" stroke-width="0.5"/>
    <line x1="240" y1="420" x2="560" y2="420" stroke-opacity="0.3" stroke-width="0.5"/>
    <line x1="287" y1="307" x2="513" y2="533" stroke-opacity="0.25" stroke-width="0.5"/>
    <line x1="513" y1="307" x2="287" y2="533" stroke-opacity="0.25" stroke-width="0.5"/>
    <!-- Rune symbols -->
    <text x="400" y="276" text-anchor="middle" font-size="10" fill="#8b3ab8" fill-opacity="0.7" stroke="none">✦</text>
    <text x="244" y="424" text-anchor="middle" font-size="10" fill="#8b3ab8" fill-opacity="0.7" stroke="none">✦</text>
    <text x="556" y="424" text-anchor="middle" font-size="10" fill="#8b3ab8" fill-opacity="0.7" stroke="none">✦</text>
  </g>

  <!-- Robe body -->
  <g fill="#1a0f22">
    <!-- outer robe -->
    <polygon points="320,240 480,240 510,480 290,480" fill="#160d1e"/>
    <!-- inner dark -->
    <polygon points="370,260 430,260 440,440 360,440" fill="#0d0810"/>
    <!-- hood shadow -->
    <ellipse cx="400" cy="210" rx="65" ry="55" fill="#160d1e"/>
  </g>

  <!-- Robe details - purple -->
  <g stroke="#8b3ab8" stroke-opacity="0.5" fill="none" stroke-width="0.8">
    <line x1="400" y1="260" x2="370" y2="440" stroke-opacity="0.3"/>
    <line x1="400" y1="260" x2="430" y2="440" stroke-opacity="0.3"/>
    <!-- shoulder runes -->
    <rect x="322" y="248" width="40" height="12" rx="2" stroke-opacity="0.6" fill="#8b3ab8" fill-opacity="0.1"/>
    <rect x="438" y="248" width="40" height="12" rx="2" stroke-opacity="0.6" fill="#8b3ab8" fill-opacity="0.1"/>
    <!-- chest emblem circle -->
    <circle cx="400" cy="320" r="22" stroke-opacity="0.7"/>
    <circle cx="400" cy="320" r="14" stroke-opacity="0.4"/>
    <polygon points="400,308 411,316 407,329 393,329 389,316" fill="#8b3ab8" fill-opacity="0.3" stroke-opacity="0.8"/>
  </g>

  <!-- Face under hood - minimal -->
  <g>
    <ellipse cx="400" cy="218" rx="28" ry="30" fill="#12080f"/>
    <!-- glowing eyes -->
    <ellipse cx="390" cy="215" rx="5" ry="3" fill="#d4622a" opacity="0.9"/>
    <ellipse cx="410" cy="215" rx="5" ry="3" fill="#d4622a" opacity="0.9"/>
    <ellipse cx="390" cy="215" rx="8" ry="5" fill="#d4622a" opacity="0.2" filter="url(#medBlur)"/>
    <ellipse cx="410" cy="215" rx="8" ry="5" fill="#d4622a" opacity="0.2" filter="url(#medBlur)"/>
  </g>

  <!-- Staff left hand -->
  <g>
    <rect x="288" y="270" width="8" height="200" rx="4" fill="#2a1f35" stroke="#8b3ab8" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- orb top -->
    <circle cx="292" cy="258" r="16" fill="#1a1028" stroke="#8b3ab8" stroke-width="1" stroke-opacity="0.8"/>
    <circle cx="292" cy="258" r="10" fill="#8b3ab8" fill-opacity="0.3"/>
    <circle cx="292" cy="258" r="16" fill="#8b3ab8" fill-opacity="0.05" filter="url(#medBlur)"/>
    <!-- orb glow -->
    <circle cx="292" cy="258" r="26" fill="#8b3ab8" fill-opacity="0.12" filter="url(#softBlur)"/>
  </g>

  <!-- Floating spell shards -->
  <g>
    <polygon points="460,160 472,180 448,180" fill="#8b3ab8" fill-opacity="0.7"/>
    <polygon points="490,130 498,148 482,148" fill="#d4622a" fill-opacity="0.8"/>
    <polygon points="440,110 452,128 428,128" fill="#8b3ab8" fill-opacity="0.5"/>
    <polygon points="510,200 520,215 500,215" fill="#00c8d4" fill-opacity="0.5"/>
    <polygon points="320,140 330,158 310,158" fill="#d4622a" fill-opacity="0.6"/>
    <polygon points="290,170 300,188 280,188" fill="#8b3ab8" fill-opacity="0.5"/>
  </g>

  <!-- Sparkle particles -->
  <g fill="#c070f0">
    <circle cx="350" cy="200" r="1.5" opacity="0.8"/>
    <circle cx="330" cy="250" r="1" opacity="0.6"/>
    <circle cx="460" cy="220" r="2" opacity="0.7"/>
    <circle cx="480" cy="270" r="1" opacity="0.5"/>
    <circle cx="200" cy="300" r="1.5" opacity="0.4"/>
    <circle cx="600" cy="280" r="1.5" opacity="0.4"/>
    <circle cx="250" cy="380" r="1" opacity="0.3"/>
    <circle cx="560" cy="360" r="1" opacity="0.3"/>
  </g>

  <text x="400" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#8b3ab8" fill-opacity="0.5" letter-spacing="6">V O I D  &amp;  S O U L</text>
  <text x="400" y="496" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#888" letter-spacing="3">Z M Q _ Q  ·  2 0 2 5</text>
</svg>